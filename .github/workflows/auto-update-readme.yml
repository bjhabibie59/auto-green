name: Auto Update README

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README
        run: |
          echo "# Auto Update Repository" > README.md
          echo "" >> README.md
          echo "Last update: $(date -u)" >> README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "docs: auto update"
            git push
          fi
